services:
  - type: web
    name: sfv-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sfv
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_INACTIVITY_MINUTES
        value: "120"
      - key: SESSION_MAX_DAYS
        value: "30"
