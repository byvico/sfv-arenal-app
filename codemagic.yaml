workflows:
  android-build:
    name: Android Build
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      - npm install --legacy-peer-deps
      - npx cap sync android
      - cd android
      - chmod +x gradlew
      - ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/*/.apk
