workflows:
  android-build:
    name: Android Build
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      - npm install --legacy-peer-deps
      - chmod +x node_modules/.bin/cap
      - npx cap sync android
      - chmod +x android/gradlew
      - cd android && ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/*/.apk
